services:

  postgres:
    image: postgres:16-alpine
    container_name: boardwar_db
    environment:
      POSTGRES_DB: boardwar
      POSTGRES_USER: boardwar
      POSTGRES_PASSWORD: boardwar1234
    ports:
      - "5433:5432"
    volumes:
      - boardwar_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boardwar"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: boardwar_redis
    ports:
      - "6379:6379"
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  boardwar_pgdata:

  
